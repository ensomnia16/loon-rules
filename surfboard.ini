;==================================================================
; Surfboard 自定义规则模板（subconverter custom config）
; 用法：在订阅 URL 中追加 &config=<本文件 raw URL>
; 仓库：https://github.com/ensomnia16/loon-rules
;
; 语法说明：
;   - 反引号(`)是 custom_proxy_group 字段分隔符，禁止改成单引号
;   - 选择组：name`select`[]Option1`[]Option2`...
;   - 节点筛选组（按节点名正则匹配）：name`url-test`(regex)`url`interval[,timeout][,tolerance]
;   - 内联规则：ruleset=GROUP,[]TYPE,VALUE
;   - 远端规则集：ruleset=GROUP,URL
;==================================================================

[custom]

;------------------------------------------------------------------
; 基础开关
;------------------------------------------------------------------
; 启用规则生成器（让下面 ruleset 生效）
enable_rule_generator=true
; 覆盖订阅原有规则（丢弃机场默认规则，避免我的规则被冲掉）
overwrite_original_rules=true

;==================================================================
; 策略组定义
;==================================================================

;------------------------------------------------------------------
; 主选择组
;------------------------------------------------------------------
custom_proxy_group=Proxies`select`[]Auto`[]HK`[]JP`[]SG`[]TW`[]US`[]Mainland`[].*

;------------------------------------------------------------------
; 流媒体 / 应用分流组
;------------------------------------------------------------------
custom_proxy_group=YouTube`select`[]Proxies`[]HK`[]JP`[]SG`[]TW`[]US`[].*
custom_proxy_group=Disney`select`[]Proxies`[]HK`[]JP`[]SG`[]TW`[]US`[].*
custom_proxy_group=Netflix`select`[]Proxies`[]HK`[]JP`[]SG`[]TW`[]US`[].*
custom_proxy_group=Hbomax`select`[]Proxies`[]HK`[]JP`[]SG`[]TW`[]US`[].*
; 巴哈姆特默认走台湾节点
custom_proxy_group=Bahamut`select`[]TW`[]Proxies`[]HK`[]JP`[]SG`[]US`[].*
; B 站默认直连，第二选项放港台 / 大陆备用
custom_proxy_group=Bilibili`select`[]DIRECT`[]HK`[]TW`[]Mainland`[]Proxies`[].*
custom_proxy_group=Spotify`select`[]Proxies`[]DIRECT`[]HK`[]JP`[]SG`[]TW`[]US`[].*
custom_proxy_group=Steam`select`[]DIRECT`[]Proxies`[]HK`[]JP`[]SG`[]TW`[]US`[].*
custom_proxy_group=Telegram`select`[]Proxies`[]HK`[]JP`[]SG`[]TW`[]US`[].*
; Misc 杂项分流（Twitter/X 等），默认走代理
custom_proxy_group=Misc`select`[]Proxies`[]HK`[]JP`[]SG`[]TW`[]US`[].*
custom_proxy_group=Google`select`[]Proxies`[]HK`[]JP`[]SG`[]TW`[]US`[].*
custom_proxy_group=Microsoft`select`[]DIRECT`[]Proxies`[]HK`[]JP`[]SG`[]TW`[]US`[].*
; AI 服务优先美/日/新/台节点（避免港区被部分服务屏蔽）
custom_proxy_group=OpenAI`select`[]Proxies`[]US`[]JP`[]SG`[]TW`[].*
custom_proxy_group=PayPal`select`[]DIRECT`[]Proxies`[]HK`[]JP`[]SG`[]TW`[]US`[].*
custom_proxy_group=Apple`select`[]DIRECT`[]Proxies`[]HK`[]JP`[]SG`[]TW`[]US`[].*

;------------------------------------------------------------------
; 兜底组（FINAL 规则指向）
;------------------------------------------------------------------
custom_proxy_group=Final`select`[]Proxies`[]DIRECT`[].*

;------------------------------------------------------------------
; 地区子组（按节点名 emoji + 国家名正则筛选）
;   - url-test 自动选最快节点
;   - tolerance=50ms：切换冷却阈值
;------------------------------------------------------------------
custom_proxy_group=Auto`url-test`(.*)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=HK`url-test`(?i)(🇭🇰|HK|Hong[ ]?Kong|香港)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=JP`url-test`(?i)(🇯🇵|JP|Japan|日本|东京|大阪)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=SG`url-test`(?i)(🇸🇬|SG|Singapore|新加坡|狮城)`http://www.gstatic.com/generate_204`300,,50
; TW 仅匹配 🇹🇼 / Taiwan / 台湾 等明确标识，避免和 🇨🇳 混淆
custom_proxy_group=TW`url-test`(?i)(🇹🇼|TW|Taiwan|台湾|台北|台中|台南|高雄)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=US`url-test`(?i)(🇺🇸|US|United[ ]?States|美国|洛杉矶|纽约|圣何塞|硅谷|西雅图)`http://www.gstatic.com/generate_204`300,,50
; 中国大陆节点（仅在机场提供大陆中转节点时有效）
custom_proxy_group=Mainland`url-test`(?i)(🇨🇳|CN|China|中国|大陆|回国|北京|上海|广州|深圳|杭州)`http://www.gstatic.com/generate_204`300,,50

;==================================================================
; 规则集（按匹配优先级从上到下）
;==================================================================

;------------------------------------------------------------------
; 1. 境外 AI 服务（最高优先级，避免被其他规则集吞掉）
;------------------------------------------------------------------
; 本仓库的 AI 合集（含 Apple Intelligence / JetBrains AI / Trae / Anthropic IP-CIDR 等内联规则做不到的条目）
ruleset=OpenAI,https://raw.githubusercontent.com/ensomnia16/loon-rules/main/AI.list
; 以下为内联补充，与 AI.list 重复的域名 subconverter 会自动去重
; OpenAI / ChatGPT / Sora
ruleset=OpenAI,[]DOMAIN-SUFFIX,openai.com
ruleset=OpenAI,[]DOMAIN-SUFFIX,chatgpt.com
ruleset=OpenAI,[]DOMAIN-SUFFIX,oaistatic.com
ruleset=OpenAI,[]DOMAIN-SUFFIX,oaiusercontent.com
ruleset=OpenAI,[]DOMAIN-SUFFIX,sora.com
; Anthropic / Claude
ruleset=OpenAI,[]DOMAIN-SUFFIX,anthropic.com
ruleset=OpenAI,[]DOMAIN-SUFFIX,claude.ai
ruleset=OpenAI,[]DOMAIN-SUFFIX,claude.com
ruleset=OpenAI,[]DOMAIN-SUFFIX,claudeusercontent.com
; Google AI（Gemini / AI Studio / NotebookLM / DeepMind）
ruleset=OpenAI,[]DOMAIN,gemini.google.com
ruleset=OpenAI,[]DOMAIN,aistudio.google.com
ruleset=OpenAI,[]DOMAIN,notebooklm.google.com
ruleset=OpenAI,[]DOMAIN,ai.google.dev
ruleset=OpenAI,[]DOMAIN,generativelanguage.googleapis.com
ruleset=OpenAI,[]DOMAIN,makersuite.google.com
ruleset=OpenAI,[]DOMAIN-SUFFIX,deepmind.com
ruleset=OpenAI,[]DOMAIN-SUFFIX,deepmind.google
ruleset=OpenAI,[]DOMAIN-SUFFIX,labs.google
; Microsoft Copilot
ruleset=OpenAI,[]DOMAIN-SUFFIX,copilot.microsoft.com
ruleset=OpenAI,[]DOMAIN-SUFFIX,copilot.cloud.microsoft
; xAI / Grok
ruleset=OpenAI,[]DOMAIN-SUFFIX,x.ai
ruleset=OpenAI,[]DOMAIN-SUFFIX,grok.com
; Meta AI
ruleset=OpenAI,[]DOMAIN-SUFFIX,meta.ai
; 其他主流大模型 / 聚合服务
ruleset=OpenAI,[]DOMAIN-SUFFIX,perplexity.ai
ruleset=OpenAI,[]DOMAIN-SUFFIX,mistral.ai
ruleset=OpenAI,[]DOMAIN-SUFFIX,character.ai
ruleset=OpenAI,[]DOMAIN-SUFFIX,poe.com
ruleset=OpenAI,[]DOMAIN-SUFFIX,openrouter.ai
; AI 模型托管 / 训练平台
ruleset=OpenAI,[]DOMAIN-SUFFIX,huggingface.co
ruleset=OpenAI,[]DOMAIN-SUFFIX,hf.co
ruleset=OpenAI,[]DOMAIN-SUFFIX,cohere.ai
ruleset=OpenAI,[]DOMAIN-SUFFIX,cohere.com
ruleset=OpenAI,[]DOMAIN-SUFFIX,replicate.com
ruleset=OpenAI,[]DOMAIN-SUFFIX,replicate.delivery
ruleset=OpenAI,[]DOMAIN-SUFFIX,stability.ai
; AIGC 媒体生成
ruleset=OpenAI,[]DOMAIN-SUFFIX,midjourney.com
ruleset=OpenAI,[]DOMAIN-SUFFIX,runwayml.com
ruleset=OpenAI,[]DOMAIN-SUFFIX,elevenlabs.io
ruleset=OpenAI,[]DOMAIN-SUFFIX,suno.com
ruleset=OpenAI,[]DOMAIN-SUFFIX,suno.ai
ruleset=OpenAI,[]DOMAIN-SUFFIX,udio.com
; AI 编辑器 / Coding 工具
ruleset=OpenAI,[]DOMAIN-SUFFIX,cursor.com
ruleset=OpenAI,[]DOMAIN-SUFFIX,cursor.sh
ruleset=OpenAI,[]DOMAIN-SUFFIX,codeium.com
ruleset=OpenAI,[]DOMAIN-SUFFIX,windsurf.com
ruleset=OpenAI,[]DOMAIN-SUFFIX,codeium.ai
ruleset=OpenAI,[]DOMAIN-SUFFIX,v0.dev
ruleset=OpenAI,[]DOMAIN-SUFFIX,v0.app
ruleset=OpenAI,[]DOMAIN-SUFFIX,githubcopilot.com
ruleset=OpenAI,[]DOMAIN-SUFFIX,copilot.github.com

;------------------------------------------------------------------
; 2. Misc 杂项合集（本仓库 Misc.list：Twitter/X、Meta 社交、TikTok、Discord、Reddit、Line、Twitch、Pixiv、Wikipedia、GitHub、Speedtest）
;------------------------------------------------------------------
ruleset=Misc,https://raw.githubusercontent.com/ensomnia16/loon-rules/main/Misc.list

;------------------------------------------------------------------
; 3. 流媒体 / 应用规则集（blackmatrix7/ios_rule_script Surge 列表）
;------------------------------------------------------------------
ruleset=YouTube,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/YouTube/YouTube.list
ruleset=Disney,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Disney/Disney.list
ruleset=Netflix,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Netflix/Netflix.list
ruleset=Hbomax,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/HBO/HBO.list
ruleset=Bahamut,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Bahamut/Bahamut.list
ruleset=Bilibili,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/BiliBili/BiliBili.list
ruleset=Spotify,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Spotify/Spotify.list
ruleset=Steam,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Steam/Steam.list
ruleset=Telegram,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Telegram/Telegram.list
ruleset=PayPal,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/PayPal/PayPal.list
ruleset=Apple,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Apple/Apple.list
ruleset=Microsoft,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Microsoft/Microsoft.list
; Google 放在最后避免吞掉上面 gemini / aistudio 等子域名
ruleset=Google,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Google/Google.list

;------------------------------------------------------------------
; 4. 直连规则
;------------------------------------------------------------------
; 内网 / 私有地址
ruleset=DIRECT,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Lan/Lan.list
; 国内大全（域名 + IP CIDR）
ruleset=DIRECT,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/ChinaMax/ChinaMax.list
; 中国大陆 IP 段兜底
ruleset=DIRECT,[]GEOIP,CN

;------------------------------------------------------------------
; 5. FINAL 兜底
;------------------------------------------------------------------
ruleset=Final,[]FINAL
