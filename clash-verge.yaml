# =============================================================================
# 策略组
# =============================================================================
proxy-groups:
  # 主选择组
  - name: Proxies
    type: select
    proxies: [Auto, HK, JP, SG, TW, US]
    use: [airport]

  # AI 服务 — 默认 US/JP 优先
  - name: AI
    type: select
    proxies: [Proxies, US, JP, SG, TW]
  - name: Misc
    type: select
    proxies: [Proxies, US, JP, SG, TW]

  # 流媒体
  - name: YouTube
    type: select
    proxies: [Proxies, HK, JP, SG, TW, US]
  - name: Disney
    type: select
    proxies: [Proxies, HK, JP, SG, TW, US]
  - name: Netflix
    type: select
    proxies: [Proxies, HK, JP, SG, TW, US]
  - name: Hbomax
    type: select
    proxies: [Proxies, HK, JP, SG, TW, US]
  - name: Bahamut
    type: select
    proxies: [TW, Proxies, HK, JP, SG, US]   # 巴哈默认 TW
  - name: Bilibili
    type: select
    proxies: [DIRECT, HK, TW, Mainland, Proxies]   # B 站默认直连

  # 应用
  - name: Spotify
    type: select
    proxies: [Proxies, DIRECT, HK, JP, SG, TW, US]
  - name: Steam
    type: select
    proxies: [DIRECT, Proxies, HK, JP, SG, TW, US]
  - name: Telegram
    type: select
    proxies: [Proxies, HK, JP, SG, TW, US]
  - name: Google
    type: select
    proxies: [Proxies, HK, JP, SG, TW, US]
  - name: Microsoft
    type: select
    proxies: [DIRECT, Proxies, HK, JP, SG, TW, US]
  - name: PayPal
    type: select
    proxies: [DIRECT, Proxies, HK, JP, SG, TW, US]
  - name: Apple
    type: select
    proxies: [DIRECT, Proxies, HK, JP, SG, TW, US]   # 国区 Apple Music 默认直连

  # 兜底
  - name: Final
    type: select
    proxies: [Proxies, DIRECT]

  # ============= 地区组 (url-test 自动选最快) =============
  - name: Auto
    type: url-test
    use: [airport]
    url: 'http://www.gstatic.com/generate_204'
    interval: 300
    tolerance: 50

  - name: HK
    type: url-test
    use: [airport]
    filter: '(?i)(🇭🇰|HK|Hong[ ]?Kong|香港)'
    url: 'http://www.gstatic.com/generate_204'
    interval: 300
    tolerance: 50

  - name: JP
    type: url-test
    use: [airport]
    filter: '(?i)(🇯🇵|JP|Japan|日本|东京|大阪)'
    url: 'http://www.gstatic.com/generate_204'
    interval: 300
    tolerance: 50

  - name: SG
    type: select
    use: [airport]
    filter: '(?i)(🇸🇬|SG|Singapore|新加坡|狮城)'
    url: 'http://www.gstatic.com/generate_204'
    interval: 300
    tolerance: 50

  - name: TW
    type: url-test
    use: [airport]
    filter: '(?i)(🇹🇼|TW|Taiwan|台湾|台北|台中|台南|高雄)'
    url: 'http://www.gstatic.com/generate_204'
    interval: 300
    tolerance: 50

  - name: US
    type: url-test
    use: [airport]
    filter: '(?i)(🇺🇸|US|United[ ]?States|美国|洛杉矶|纽约|圣何塞|硅谷|西雅图)'
    url: 'http://www.gstatic.com/generate_204'
    interval: 300
    tolerance: 50

  # Mainland: 仅匹配明确的"回国/大陆"关键词, 避免把 "🇨🇳 台湾" 节点误吞进来
  # 你当前机场没有真正的回国节点, 此组会是空的; 换机场或加自建回国节点时会自动填充
  - name: Mainland
    type: url-test
    use: [airport]
    filter: '(?i)(回国|大陆|京沪|北京|上海|广州|深圳|杭州)'
    url: 'http://www.gstatic.com/generate_204'
    interval: 300
    tolerance: 50

# =============================================================================
# 规则 (从上到下, 先匹配先生效)
# =============================================================================
rules:
  # ---- AI 服务 (最高优先级) ----
  - RULE-SET,ai,AI
  - RULE-SET,Misc,Misc

  # ---- 流媒体 / 应用 ----
  - RULE-SET,youtube,YouTube
  - RULE-SET,disney,Disney
  - RULE-SET,netflix,Netflix
  - RULE-SET,hbo,Hbomax
  - RULE-SET,bahamut,Bahamut
  - RULE-SET,bilibili,Bilibili
  - RULE-SET,spotify,Spotify
  - RULE-SET,steam,Steam
  - RULE-SET,telegram,Telegram
  - RULE-SET,paypal,PayPal
  - RULE-SET,apple,Apple
  - RULE-SET,microsoft,Microsoft
  - RULE-SET,google,Google

  # ---- 直连 ----
  - RULE-SET,lan,DIRECT
  - RULE-SET,cnmax,DIRECT
  - GEOIP,LAN,DIRECT,no-resolve
  - GEOIP,CN,DIRECT,no-resolve

  # ---- 兜底 ----
  - MATCH,Final
