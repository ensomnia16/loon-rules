# =============================================================================
#  Mihomo (Clash Meta) Config — Personal  [clash-verge 变体 / 桌面]
#  Author: ensomnia16
#  Repo:   github.com/ensomnia16/loon-rules   (规则源, 公开)
#  Host:   本文件托管在 *secret gist* (含订阅 token, 切勿提交到公开仓库)
#
#  与 clash-meta 版的区别(桌面优化):
#    - find-process-mode: strict  → 桌面可按进程名分流
#    - 预置 TUN 段(默认关, 见下方)→ 需要全局虚拟网卡时打开,
#      或直接用 Clash Verge Rev 界面的 "TUN 模式" 开关(GUI 会自动注入)
#
#  设计原则:
#    - 节点 ← proxy-providers 从机场订阅拉取
#    - 规则 ← rule-providers 从 GitHub 拉取(自己掌控)
#    - 主配置(本文件)永不被覆盖
# =============================================================================

# ---------- Global ----------
mixed-port: 7890
allow-lan: false           # 桌面想共享给局域网其它设备时改 true
mode: rule
log-level: info
ipv6: false
unified-delay: true        # 测速去除握手时间, 数字更准
tcp-concurrent: true       # 并发拨号, 加速冷启动
find-process-mode: strict  # 桌面: 启用按进程名匹配 (PROCESS-NAME 规则)
geodata-mode: true
geo-auto-update: true
geo-update-interval: 24
external-controller: 127.0.0.1:9090

profile:
  store-selected: true     # 记住每个组上次选的节点
  store-fake-ip: true

# ---------- TUN (桌面全局代理, 默认关闭) ----------
# 打开后接管系统所有流量, 需管理员权限 / Clash Verge 的 Service 模式。
# 推荐做法: 保持这里 enable: false, 用 Clash Verge Rev 界面的 "TUN 模式"
# 开关来控制(GUI 会自动注入并管理虚拟网卡); 仅在裸 mihomo 内核下才手动改 true。
tun:
  enable: false
  stack: mixed
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack:
    - any:53

# ---------- DNS ----------
# fake-ip 模式 + 国内 DoH:
#   国内域名: alidns 返回真实国内 IP, 走 DIRECT 直连
#   海外域名: 走代理时由代理服务器重新解析, 本地 DNS 只是兜底
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '+.market.xiaomi.com'
    - 'localhost.ptlogin2.qq.com'
    - '+.srv.nintendo.net'
    - '+.stun.playstation.net'
    - 'xbox.*.microsoft.com'
    - '*.xboxlive.com'
    - 'msftconnecttest.com'
    - 'msftncsi.com'
    - 'time.*.com'
    - 'time.*.gov'
    - 'time.*.edu.cn'
    - 'time.*.apple.com'
    - 'stun.*.*'
    - 'stun.*.*.*'
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query

# =============================================================================
# 节点订阅 — 机场只拿节点, 不要它的规则
# =============================================================================
proxy-providers:
  airport:
    type: http
    # ⚠️ 脱敏模板: 真实订阅(含 token)只放在 secret gist 的同名文件里, 切勿提交到本公开仓库!
    #    在 gist 副本里把下面这行换成你的真实订阅 URL。
    url: 'https://YOUR-SUB-HOST:PORT/path?token=YOUR_TOKEN'
    interval: 86400
    path: ./providers/airport.yaml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

